---
deployment:
  tasks:
    # cPanel runs these when it deploys the repo (Update from Remote -> Deploy HEAD Commit).
    # This is a plain static site (no build step), so we copy the site files straight from the
    # repo root into the staging folder. The *.html copy auto-includes any new pages you add;
    # the asset dirs (css, js, images) are copied recursively. .git/.claude/.cpanel.yml/CLAUDE.md
    # are intentionally left out.
    - export DEPLOYPATH=/home/doorproblems/public_html/test/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R css js images video $DEPLOYPATH
    - /bin/cp *.html $DEPLOYPATH
    # robots.txt + sitemap.xml are crawler files — only effective at the domain
    # root, so they do real work once DEPLOYPATH points at public_html/ (launch).
    - /bin/cp robots.txt sitemap.xml $DEPLOYPATH
